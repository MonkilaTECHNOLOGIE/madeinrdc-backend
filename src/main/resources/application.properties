spring.application.name=madeinrdc

spring.datasource.url= jdbc:mysql://localhost:3306/madeinrdc?useSSL=false
spring.datasource.username= ${DB_USERNAME}
spring.datasource.password= ${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto= update

spring.profiles.active:dev

spring.mail.host=smtp.gmail.com
spring.mail.port=${PORT_MAIL}
spring.mail.username=${USERNAME_MAIL}
spring.mail.password=${PASSWORD_MAIL}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=215MB


supportNumber=${SUPPORT_PHONE_NUMEBER}
jwtSecret = ${JWT_SECRET}
jwtExpirationMs = ${JWT_EXPIRATION_MS}
jwtCookie =${JWT_COOKIE}

apikey-firebase = ${API_KEY_FIREBASE}
